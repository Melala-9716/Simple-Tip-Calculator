<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button id="color-button">Dark-Mode</button>
    </nav>
    <section class="section">
<h1> Tip Calculator</h1>
<p> Enter the bill amount and tip percentage to calculate the total.</p>
    <p>Bill Amount:</p>
    <input id="BILL" type="number" type="text">
    <p>Tip percentage</p>
    <input id="Tip" type="number">
    <p> Number of People</p>
    <input id="Number-of-people" type="number">
    <button id="btn">Calculate</button>
    <button id="btn-1">Reset</button>
    <div id="discription">
        <p id="bill-card">Bill:00.00</p>
        <p id="tip-card">Tip:00.00</p>
        <p id="total-card">Total:00.00</p>
        <p id="people-card">People:00</p>
    </div>
     <p  id="total">Total:00.00</p>
</section>
    <script src="script.js">
    </script>
</body>
</html>
